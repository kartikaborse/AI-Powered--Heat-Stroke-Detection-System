<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HeatGuard — Access</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #04080e;
    --surface: #080f1a;
    --surface2: #0c1826;
    --border: #1a3050;
    --border2: #243d58;
    --accent: #00c9ff;
    --orange: #ff6b35;
    --safe: #00e676;
    --high: #ff1744;
    --text: #b8d4e8;
    --text-dim: #5a8aaa;
    --text-bright: #ddeeff;
    --font-display: 'Orbitron', sans-serif;
    --font-body: 'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,201,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,201,255,0.025) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanline */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  /* Glow orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    pointer-events: none;
    z-index: 0;
  }
  .orb1 { width: 400px; height: 400px; background: rgba(0,201,255,0.06); top: -100px; left: -100px; }
  .orb2 { width: 300px; height: 300px; background: rgba(255,107,53,0.05); bottom: -80px; right: -80px; }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 440px;
    padding: 20px;
  }

  /* Logo */
  .logo {
    font-family: var(--font-display);
    font-size: 24px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 4px;
    text-align: center;
    text-shadow: 0 0 30px rgba(0,201,255,0.5);
    margin-bottom: 4px;
    animation: fadeDown 0.6s ease both;
  }

  .logo span { color: var(--orange); text-shadow: 0 0 20px rgba(255,107,53,0.5); }

  .tagline {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 32px;
    animation: fadeDown 0.6s 0.1s ease both;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.6s 0.2s ease both;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--orange), var(--accent));
    background-size: 200% 100%;
    animation: shimmer 3s linear infinite;
  }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    margin-bottom: 28px;
    border: 1px solid var(--border2);
    border-radius: 6px;
    overflow: hidden;
  }

  .tab {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    color: var(--text-dim);
    background: var(--surface2);
    border: none;
    transition: all 0.25s;
  }

  .tab.active {
    background: rgba(0,201,255,0.1);
    color: var(--accent);
    box-shadow: inset 0 -2px 0 var(--accent);
  }

  /* Form fields */
  .field {
    margin-bottom: 14px;
  }

  .field label {
    display: block;
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    color: var(--text-bright);
    font-family: var(--font-mono);
    font-size: 13px;
    padding: 11px 14px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,201,255,0.08);
  }

  .field input::placeholder { color: var(--text-dim); font-size: 11px; }

  /* Submit button */
  .btn-submit {
    width: 100%;
    margin-top: 6px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px;
    border-radius: 6px;
    border: 2px solid var(--accent);
    background: transparent;
    color: var(--accent);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
    box-shadow: 0 0 20px rgba(0,201,255,0.08);
  }

  .btn-submit::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    transform: translateX(-100%);
    transition: transform 0.3s ease;
    z-index: -1;
  }

  .btn-submit:hover { color: var(--bg); box-shadow: 0 0 30px rgba(0,201,255,0.3); }
  .btn-submit:hover::before { transform: translateX(0); }
  .btn-submit:active { transform: scale(0.98); }

  .btn-submit:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Status */
  .status-msg {
    font-family: var(--font-mono);
    font-size: 10px;
    text-align: center;
    margin-top: 12px;
    min-height: 16px;
    letter-spacing: 0.5px;
  }

  .status-msg.ok  { color: var(--safe); }
  .status-msg.err { color: var(--high); }

  /* Form panels */
  .form-panel { display: none; }
  .form-panel.active { display: block; }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 16px 0;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    letter-spacing: 1px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* Animations */
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Footer */
  .footer-note {
    text-align: center;
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 20px;
    letter-spacing: 1px;
    animation: fadeUp 0.6s 0.4s ease both;
  }

  .strength-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 6px;
    overflow: hidden;
    display: none;
  }

  .strength-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s, background 0.3s;
  }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">

  <div class="logo">🔥 HEAT<span>GUARD</span></div>
  <div class="tagline">IoT · ML · Heatstroke Detection System</div>

  <div class="card">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-panel active" id="panel-login">
      <div class="field">
        <label>Username</label>
        <input type="text" id="login-user" placeholder="Enter your username" autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="login-pass" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="btn-submit" onclick="doLogin()">⚡ Access Dashboard</button>
      <div class="status-msg" id="login-status"></div>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-panel" id="panel-register">
      <div class="field">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="e.g. Arjun Sharma" autocomplete="name">
      </div>
      <div class="field">
        <label>Username</label>
        <input type="text" id="reg-user" placeholder="Choose a username" autocomplete="username">
      </div>
      <div class="field">
        <label>Mobile Number</label>
        <input type="tel" id="reg-phone" placeholder="+91XXXXXXXXXX">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="reg-pass" placeholder="Create a password" oninput="checkStrength(this.value)" autocomplete="new-password">
        <div class="strength-bar" id="strength-bar">
          <div class="strength-fill" id="strength-fill"></div>
        </div>
      </div>
      <button class="btn-submit" onclick="doRegister()">✔ Create Account</button>
      <div class="status-msg" id="reg-status"></div>
    </div>

  </div>

  <div class="footer-note">v1.0 · RF MODEL · NodeMCU ESP8266 · Arduino Uno R3</div>

</div>

<script>
  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('panel-login').classList.toggle('active', tab === 'login');
    document.getElementById('panel-register').classList.toggle('active', tab === 'register');
  }

  function checkStrength(val) {
    const bar = document.getElementById('strength-bar');
    const fill = document.getElementById('strength-fill');
    bar.style.display = 'block';
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^a-zA-Z0-9]/.test(val)) score++;
    const pct = (score / 5) * 100;
    const colors = ['#ff1744','#ff6b35','#ffb300','#00e676','#00c9ff'];
    fill.style.width = pct + '%';
    fill.style.background = colors[score - 1] || '#ff1744';
  }

  function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value.trim();
    const status   = document.getElementById('login-status');

    if (!username || !password) {
      status.className = 'status-msg err';
      status.textContent = '✗ Please enter username and password.';
      return;
    }

    fetch('/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    })
    .then(r => r.json())
    .then(res => {
      if (res.success) {
        status.className = 'status-msg ok';
        status.textContent = '✓ Access granted. Redirecting...';
        setTimeout(() => { window.location.href = '/dashboard'; }, 800);
      } else {
        status.className = 'status-msg err';
        status.textContent = '✗ ' + (res.error || 'Invalid credentials.');
      }
    })
    .catch(() => {
      status.className = 'status-msg err';
      status.textContent = '✗ Server error. Is Flask running?';
    });
  }

  function doRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const username = document.getElementById('reg-user').value.trim();
    const phone    = document.getElementById('reg-phone').value.trim();
    const password = document.getElementById('reg-pass').value.trim();
    const status   = document.getElementById('reg-status');

    if (!name || !username || !phone || !password) {
      status.className = 'status-msg err';
      status.textContent = '✗ All fields are required.';
      return;
    }

    if (!/^\+\d{10,15}$/.test(phone)) {
      status.className = 'status-msg err';
      status.textContent = '✗ Phone must be in format +91XXXXXXXXXX';
      return;
    }

    if (password.length < 6) {
      status.className = 'status-msg err';
      status.textContent = '✗ Password must be at least 6 characters.';
      return;
    }

    fetch('/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, username, phone, password })
    })
    .then(r => r.json())
    .then(res => {
      if (res.success) {
        status.className = 'status-msg ok';
        status.textContent = '✓ Account created! Switching to login...';
        setTimeout(() => switchTab('login'), 1200);
      } else {
        status.className = 'status-msg err';
        status.textContent = '✗ ' + (res.error || 'Registration failed.');
      }
    })
    .catch(() => {
      status.className = 'status-msg err';
      status.textContent = '✗ Server error. Is Flask running?';
    });
  }

  // Allow Enter key
  document.addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const loginActive = document.getElementById('panel-login').classList.contains('active');
    if (loginActive) doLogin(); else doRegister();
  });
</script>
</body>
</html>
